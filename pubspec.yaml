name: ocean_crm
description: "OceanCRM Lead Management - Mobile Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  flutter_timezone: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21
